<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Dégradé de fond -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf2f6"/>
      <stop offset="1" stop-color="#f7e6ed"/>
    </linearGradient>
    <!-- Dégradé accent (marque) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4185c"/>
      <stop offset="1" stop-color="#960d41"/>
    </linearGradient>
    <!-- Ombre douce -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#960d41" flood-opacity="0.18"/>
    </filter>
    <!-- Tête de flèche -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#960d41"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b08a98"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Titre -->
  <text x="600" y="58" text-anchor="middle" font-size="38" font-weight="800" fill="#960d41">Comment fonctionne mon chatbot RAG</text>
  <text x="600" y="92" text-anchor="middle" font-size="20" fill="#7a4256">Retrieval-Augmented Generation — en deux phases</text>

  <!-- ====================== PHASE 1 ====================== -->
  <rect x="40" y="130" width="1120" height="190" rx="20" fill="#ffffff" opacity="0.55" stroke="#e3b9cb" stroke-width="1.5"/>
  <text x="70" y="165" font-size="20" font-weight="700" fill="#960d41">① INDEXATION</text>
  <text x="70" y="190" font-size="15" fill="#7a4256">une seule fois, sur ma machine (Python)</text>

  <!-- Blocs phase 1 -->
  <g filter="url(#shadow)">
    <rect x="70" y="215" width="190" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="165" y="248" text-anchor="middle" font-size="17" font-weight="700" fill="#3a2730">contenu.txt</text>
  <text x="165" y="272" text-anchor="middle" font-size="13.5" fill="#7a4256">mon parcours,</text>
  <text x="165" y="288" text-anchor="middle" font-size="13.5" fill="#7a4256">mes projets…</text>

  <g filter="url(#shadow)">
    <rect x="330" y="215" width="190" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="425" y="248" text-anchor="middle" font-size="17" font-weight="700" fill="#3a2730">Découpage</text>
  <text x="425" y="272" text-anchor="middle" font-size="13.5" fill="#7a4256">en « chunks »</text>
  <text x="425" y="288" text-anchor="middle" font-size="13.5" fill="#7a4256">(1 idée = 1 bloc)</text>

  <g filter="url(#shadow)">
    <rect x="590" y="215" width="190" height="78" rx="14" fill="url(#accent)"/>
  </g>
  <text x="685" y="250" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">mistral-embed</text>
  <text x="685" y="274" text-anchor="middle" font-size="13.5" fill="#f6dbe6">texte → vecteur</text>

  <g filter="url(#shadow)">
    <rect x="850" y="215" width="240" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="970" y="248" text-anchor="middle" font-size="17" font-weight="700" fill="#3a2730">embeddings.json</text>
  <text x="970" y="272" text-anchor="middle" font-size="13.5" fill="#7a4256">l'index : { texte,</text>
  <text x="970" y="288" text-anchor="middle" font-size="13.5" fill="#7a4256">vecteur 1024-D }</text>

  <!-- Flèches phase 1 -->
  <line x1="262" y1="254" x2="326" y2="254" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="522" y1="254" x2="586" y2="254" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="782" y1="254" x2="846" y2="254" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ====================== PHASE 2 ====================== -->
  <rect x="40" y="360" width="1120" height="265" rx="20" fill="#ffffff" opacity="0.55" stroke="#e3b9cb" stroke-width="1.5"/>
  <text x="70" y="395" font-size="20" font-weight="700" fill="#960d41">② REQUÊTE</text>
  <text x="70" y="420" font-size="15" fill="#7a4256">à chaque question d'un visiteur (proxy PHP, sur le serveur)</text>

  <!-- Blocs phase 2 -->
  <g filter="url(#shadow)">
    <rect x="70" y="445" width="180" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="160" y="478" text-anchor="middle" font-size="16" font-weight="700" fill="#3a2730">Question</text>
  <text x="160" y="502" text-anchor="middle" font-size="13.5" fill="#7a4256">du visiteur</text>

  <g filter="url(#shadow)">
    <rect x="300" y="445" width="180" height="78" rx="14" fill="url(#accent)"/>
  </g>
  <text x="390" y="478" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff">mistral-embed</text>
  <text x="390" y="502" text-anchor="middle" font-size="13.5" fill="#f6dbe6">question → vecteur</text>

  <g filter="url(#shadow)">
    <rect x="530" y="445" width="200" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="630" y="472" text-anchor="middle" font-size="15.5" font-weight="700" fill="#3a2730">Similarité cosinus</text>
  <text x="630" y="495" text-anchor="middle" font-size="13.5" fill="#7a4256">on garde les 4</text>
  <text x="630" y="511" text-anchor="middle" font-size="13.5" fill="#7a4256">chunks les + proches</text>

  <g filter="url(#shadow)">
    <rect x="780" y="445" width="180" height="78" rx="14" fill="#ffffff" stroke="#e3b9cb"/>
  </g>
  <text x="870" y="478" text-anchor="middle" font-size="15.5" font-weight="700" fill="#3a2730">Prompt enrichi</text>
  <text x="870" y="502" text-anchor="middle" font-size="13.5" fill="#7a4256">contexte + question</text>

  <g filter="url(#shadow)">
    <rect x="1010" y="445" width="120" height="78" rx="14" fill="url(#accent)"/>
  </g>
  <text x="1070" y="472" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">mistral-</text>
  <text x="1070" y="490" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">small</text>
  <text x="1070" y="511" text-anchor="middle" font-size="12.5" fill="#f6dbe6">génère</text>

  <!-- Flèches phase 2 -->
  <line x1="252" y1="484" x2="296" y2="484" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="482" y1="484" x2="526" y2="484" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="732" y1="484" x2="776" y2="484" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="962" y1="484" x2="1006" y2="484" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Réponse renvoyée -->
  <path d="M1070 525 L1070 575 L160 575 L160 527" fill="none" stroke="#960d41" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="470" y="558" width="260" height="34" rx="17" fill="#960d41"/>
  <text x="600" y="581" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Réponse affichée dans le chatbot</text>

  <!-- Lien entre les 2 phases : l'index alimente la recherche -->
  <path d="M970 295 C970 340, 630 350, 630 441" fill="none" stroke="#b08a98" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrowLight)"/>
  <text x="815" y="345" text-anchor="middle" font-size="13" font-style="italic" fill="#9a6478">l'index est consulté à chaque question</text>

  <!-- Légende R-A-G -->
  <text x="600" y="650" text-anchor="middle" font-size="16" fill="#7a4256"><tspan font-weight="800" fill="#960d41">R</tspan>etrieval (récupérer) + <tspan font-weight="800" fill="#960d41">A</tspan>ugmented (enrichir le prompt) + <tspan font-weight="800" fill="#960d41">G</tspan>eneration (rédiger)</text>
</svg>
